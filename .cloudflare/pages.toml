[build]
command = "cp cloudflare-package.json package.json && npm install && NODE_ENV=production npx vite build --config vite.config.js --mode production"
destination = "dist"
environment = { NODE_VERSION = "20" }

[build.environment]
BUN_INSTALL = "false"
NPM_FLAGS = "--no-package-lock --legacy-peer-deps"
USE_BUN = "false"
PACKAGE_MANAGER = "npm"
NODE_VERSION = "20"
CI = "true"

[site]
bucket = "./dist"
entry-point = "."

[env.production]
name = "production"
route = "*"

[env.staging]
name = "staging"
route = "staging.*"
